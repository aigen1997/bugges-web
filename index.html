<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Bugges Verden</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas.emscripten { display: block; cursor: none; outline: none; border: none; }
    #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-family: sans-serif; font-size: 1.5em; }
    .arrow-btn {
      display: none; position: fixed; top: 0; width: 80px; height: 100%;
      z-index: 100; background: rgba(255,255,255,0.05); border: none;
      color: rgba(255,255,255,0.4); font-size: 48px;
      user-select: none; -webkit-user-select: none; touch-action: none;
      align-items: center; justify-content: center;
    }
    .arrow-btn:active { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); }
    #arrow-left { left: 0; }
    #arrow-right { right: 0; }
    @media (pointer: coarse) { .arrow-btn { display: flex; } }
  </style>
</head>
<body>
  <div id="loading">Loading...</div>
  <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="0"></canvas>
  <div id="arrow-left" class="arrow-btn">&#x25C0;</div>
  <div id="arrow-right" class="arrow-btn">&#x25B6;</div>
  <script>
    var c = document.getElementById('canvas');
    c.focus();
    c.addEventListener('click', function() {
      c.focus();
      if (!document.fullscreenElement) {
        (document.body.requestFullscreen || document.body.webkitRequestFullscreen || function(){}).call(document.body);
        screen.orientation && screen.orientation.lock && screen.orientation.lock('landscape').catch(function(){});
      }
    });
    document.addEventListener('keydown', function(e) { if(e.key>='1'&&e.key<='9') e.preventDefault(); });
    window.mobileArrow = 0;
    ['left','right'].forEach(function(dir) {
      var btn = document.getElementById('arrow-' + dir);
      var val = dir === 'left' ? -1 : 1;
      btn.addEventListener('touchstart', function(e) { e.preventDefault(); window.mobileArrow = val; }, { passive: false });
      btn.addEventListener('touchend', function(e) { e.preventDefault(); window.mobileArrow = 0; }, { passive: false });
      btn.addEventListener('touchcancel', function(e) { window.mobileArrow = 0; });
    });
    var Module = {
      canvas: c,
      onRuntimeInitialized: function() { document.getElementById('loading').style.display = 'none'; c.focus(); }
    };
  </script>
  <script src="bugges_verden.js"></script>
</body>
</html>
